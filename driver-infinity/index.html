<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Driver Infinity</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@remix-gg/sdk@latest/dist/index.min.js"></script>
  <script>
    window.RemixSDK = window.RemixSDK || {};
    window.RemixSDK.ready = window.RemixSDK.ready || (async function() {});
    window.RemixSDK.onPlayAgain = window.RemixSDK.onPlayAgain || function() {};
    window.RemixSDK.onToggleMute = window.RemixSDK.onToggleMute || function() {};
    window.RemixSDK.hapticFeedback = window.RemixSDK.hapticFeedback || function() {};
    window.RemixSDK.singlePlayer = window.RemixSDK.singlePlayer || {
      actions: {
        gameOver: function() {},
        saveGameState: function() {}
      }
    };
    function waitForSDKReady(sdk, timeoutMs) {
      if (!sdk || !sdk.ready) return Promise.resolve();
      return Promise.race([
        Promise.resolve().then(function() { return sdk.ready(); }),
        new Promise(function(resolve) { setTimeout(resolve, timeoutMs); })
      ]).catch(function() {});
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }
    #vp {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #1a1a2e;
    }
    .gc { width: 100%; height: 100%; max-width: 520px; position: relative; }
    #gc { display: block; width: 100%; height: 100%; touch-action: none; }

    #score {
      position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
      color: #fff; font-family: 'Courier New', monospace; font-size: 26px;
      font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.9);
      pointer-events: none; white-space: nowrap; z-index: 10;
    }
    #speed-bar-wrap {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: 140px; pointer-events: none; z-index: 10;
    }
    #speed-label { color: #fff; font-family: monospace; font-size: 12px; text-align: center; margin-bottom: 4px; opacity: .65; }
    #speed-bar-bg { width: 100%; height: 7px; background: rgba(255,255,255,.15); border-radius: 4px; }
    #speed-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg,#0f0,#ff0,#f00); width: 0%; transition: width .1s; }

    #overlay {
      position: absolute; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.72);
      color: #fff; font-family: 'Courier New', monospace;
      cursor: pointer; user-select: none;
    }
    #overlay h1  { font-size: 64px; margin-bottom: 4px; letter-spacing: 6px; font-family: 'Bebas Neue', 'Courier New', monospace; }
    #overlay .infinity { font-size: 22px; letter-spacing: 12px; opacity: 0.55; margin-bottom: 0; font-family: 'Bebas Neue', 'Courier New', monospace; }
    #title-frame {
      display: inline-flex; flex-direction: column; align-items: center;
      padding: 22px 48px 18px;
      margin-bottom: 28px;
      border-radius: 14px;
      background:
        linear-gradient(rgba(10,10,30,0.55), rgba(10,10,30,0.55)) padding-box,
        linear-gradient(160deg, #0a1a4a, #1a4aaa 35%, #e87040 70%, #f0c060) border-box;
      border: 3px solid transparent;
      box-shadow: 0 0 28px rgba(232,112,64,0.18), inset 0 0 18px rgba(10,26,74,0.25);
    }

    #help-btn {
      position: absolute; bottom: 14px; left: 14px; z-index: 30;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.35);
      color: #fff; font-size: 18px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none; backdrop-filter: blur(4px);
      transition: background .2s;
    }
    #help-btn:hover { background: rgba(255,255,255,0.28); }
    #help-panel {
      position: absolute; bottom: 58px; left: 14px; z-index: 30;
      background: rgba(10,10,20,0.92); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px; padding: 14px 18px; color: #fff;
      font-family: 'Courier New', monospace; font-size: 13px;
      line-height: 2; white-space: nowrap;
      backdrop-filter: blur(8px); display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    #help-panel.visible { display: block; }
    #help-panel .row { display: flex; align-items: center; gap: 10px; }
    #help-panel .key {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 5px; padding: 1px 8px; font-size: 12px; min-width: 28px;
      text-align: center;
    }
    #overlay .sub { font-size: 17px; opacity: 0.7; margin: 4px 12px; text-align: center; }
    #overlay .tap { font-size: 22px; margin-top: 28px; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
    #overlay.hidden { display: none !important; }
    #status { font-size: 14px; opacity: .5; margin-top: 16px; }

    .continue-frame {
      display: flex;
      flex-direction: column;

      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
    .continue-btn {
      background: linear-gradient(180deg, #ffd86b, #f29d38);
      color: #10131a;
      box-shadow: 0 8px 22px rgba(242,157,56,0.35);

    .continue-btn:disabled {

    }

    @media (orientation: landscape) { .gc { max-width: 400px; } }
    @media (max-height: 600px) { #overlay h1 { font-size: 36px; } }

<body>
<div id="vp">
  <div class="gc">
    <canvas id="gc"></canvas>
    <div id="score">0 m</div>
    <div id="speed-bar-wrap">
      <div id="speed-label">SPEED</div>
      <div id="speed-bar-bg"><div id="speed-bar"></div></div>
    </div>
    <div id="help-btn">?</div>
    <div id="help-panel">
      <div class="row"><span class="key">←</span><span class="key">A</span> стeer left</div>
      <div class="row"><span class="key">→</span><span class="key">D</span> steer right</div>
      <div class="row"><span class="key">touch</span> swipe left / right</div>
      <div class="row"><span class="key">Space</span><span class="key">Enter</span> start / restart</div>
      <div style="margin-top:8px;opacity:0.45;font-size:11px">Don't fall off the road!<br>Dodge the falling barriers.</div>
    </div>

      <div id="title-frame">
        <h1>DRIVER</h1>
        <p class="infinity">INFINITY</p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
document.getElementById('status').textContent = '';
const helpBtn = document.getElementById('help-btn');
const helpPanel = document.getElementById('help-panel');
function stopAndToggleHelp(e) {
  e.stopPropagation();
  e.preventDefault();
  helpPanel.classList.toggle('visible');
}
helpBtn.addEventListener('mousedown',   stopAndToggleHelp);
helpBtn.addEventListener('touchstart',  stopAndToggleHelp, { passive: false });
helpPanel.addEventListener('mousedown',  e => { e.stopPropagation(); });
helpPanel.addEventListener('touchstart', e => { e.stopPropagation(); }, { passive: false });
document.addEventListener('click', () => helpPanel.classList.remove('visible'));
async function initGame() {
const sdk = window.FarcadeSDK || window.RemixSDK;
let isMuted = false;
await waitForSDKReady(sdk, 1200);
if (sdk && sdk.onToggleMute) {
  sdk.onToggleMute(({ isMuted: muted }) => {
    isMuted = !!muted;
    if (audioCtx) {
      if (isMuted) {
        audioCtx.suspend().catch(() => {});
      } else {
        audioCtx.resume().catch(() => {});
      }
    }
  });
}
if (sdk && sdk.onPlayAgain) {
  sdk.onPlayAgain(() => {
    startGame();
  });
}
function extractPurchaseSlug(itemData) {
  let slug = '';
  if (typeof itemData === 'string') slug = itemData;
  else if (itemData && itemData.slug) slug = itemData.slug;
  else if (itemData && itemData.item) slug = itemData.item;
  else if (itemData && itemData.id) slug = itemData.id;
  else if (itemData && itemData.itemSlug) slug = itemData.itemSlug;
  else if (itemData && itemData.itemId) slug = itemData.itemId;
  return String(slug || '').toLowerCase();
}
function handlePurchase(itemData, fromCallback) {
  const slug = extractPurchaseSlug(itemData);
  if (!slug) return;
  if (slug.includes(CONTINUE_ITEM_SLUG) || slug.includes('ontinue-playing')) {
    applyPurchase(CONTINUE_ITEM_SLUG, fromCallback);
  }
}
if (sdk) {
  if (typeof sdk.onPurchaseComplete === 'function') {
    sdk.onPurchaseComplete((itemData) => {
      handlePurchase(itemData, true);
    });
  } else if (typeof sdk.onItemPurchased === 'function') {
    sdk.onItemPurchased((itemData) => {
      handlePurchase(itemData, true);
    });
  }
}

// ── CONSTANTS ──────────────────────────────────────────────
const ROAD_W         = 10;
const SEG_LEN        = 40;
const SEG_COUNT      = 12;
const SPEED_BASE     = 16;
const SPEED_MAX      = 45;
const TURN_SPEED     = 5.5;
const TURN_INERTIA   = 7;
const CAR_HALF_W     = ROAD_W / 2 - 0.8;
const OBS_INTERVAL0  = 2.8;
const OBS_FALL_G     = 22;
const CAM_H          = 5.5;
const CAM_DIST       = 13;

// ── STATE ──────────────────────────────────────────────────
let gameOverAt = 0;
let state      = 'start';
let distance   = 0;
let carSpeed   = SPEED_BASE;
let carVelX    = 0;
let fallTimer  = 0;
let obsTimer   = 0;
let obsInterval = OBS_INTERVAL0;
let inputX     = 0;
let rollAngle  = 0;
let touchStartX = 0, touchCurX = 0, touchDown = false;
let continueOfferTimer = null;
let continueCountdownTimer = null;
let continueSecondsLeft = 15;
let hasActiveContinue = false;
let hasUsedContinueThisRun = false;
const keys = {};
const CONTINUE_ITEM_SLUG = 'ontinue-playing';
const CONTINUE_SPENT_KEY = 'continuePlayingSpent';

// ── RENDERER ───────────────────────────────────────────────
const canvas = document.getElementById('gc');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene  = new THREE.Scene();
// Градиентное небо через canvas-текстуру
const skyCanvas = document.createElement('canvas');
skyCanvas.width = 64; skyCanvas.height = 1024;
const skyCtx = skyCanvas.getContext('2d');
const skyGrad = skyCtx.createLinearGradient(0, 0, 0, skyCanvas.height);
skyGrad.addColorStop(0.0, '#08142f');
skyGrad.addColorStop(0.22, '#12306f');
skyGrad.addColorStop(0.48, '#2d67c7');
skyGrad.addColorStop(0.72, '#d96a42');
skyGrad.addColorStop(1.0, '#f3c76a');
skyCtx.fillStyle = skyGrad;
skyCtx.fillRect(0, 0, skyCanvas.width, skyCanvas.height);
const skyTex = new THREE.CanvasTexture(skyCanvas);
skyTex.colorSpace = THREE.SRGBColorSpace;
skyTex.minFilter = THREE.LinearFilter;
skyTex.magFilter = THREE.LinearFilter;
scene.background = skyTex;
scene.fog = new THREE.FogExp2(0xe08850, 0.011);

const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 350);

// ── LIGHTING ───────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff0e0, 0.6));

const sun = new THREE.DirectionalLight(0xffeedd, 1.1);
sun.position.set(15, 40, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
Object.assign(sun.shadow.camera, { left:-25, right:25, top:25, bottom:-25, far:160 });
scene.add(sun);
scene.add(sun.target);
const skyLight = new THREE.DirectionalLight(0x8ebbff, 0.35);
skyLight.position.set(-8, 10, -10);
scene.add(skyLight);

// ── ROAD ───────────────────────────────────────────────────
const matRoad   = new THREE.MeshLambertMaterial({ color: 0x2c2c2c });
const matSide   = new THREE.MeshLambertMaterial({ color: 0xffffff });
const matCenter = new THREE.MeshLambertMaterial({ color: 0xffcc00 });
const matShldr  = new THREE.MeshLambertMaterial({ color: 0x555555 });

const gRoad  = new THREE.BoxGeometry(ROAD_W, 0.18, SEG_LEN);
const gShldr = new THREE.BoxGeometry(1.8, 0.15, SEG_LEN);
const gEdge  = new THREE.BoxGeometry(0.14, 0.22, SEG_LEN);
const gDash  = new THREE.BoxGeometry(0.10, 0.22, 3.5);

const segments = [];
function makeSeg(z) {
  const g = new THREE.Group();
  const r = new THREE.Mesh(gRoad, matRoad); r.receiveShadow = true; g.add(r);
  for (const sx of [-(ROAD_W/2+0.9), ROAD_W/2+0.9]) {
    const sh = new THREE.Mesh(gShldr, matShldr); sh.position.set(sx,-0.015,0); g.add(sh);
  }
  for (const sx of [-(ROAD_W/2-0.18), ROAD_W/2-0.18]) {
    const el = new THREE.Mesh(gEdge, matSide); el.position.set(sx, 0.01, 0); g.add(el);
  }
  for (let dz = -SEG_LEN/2+2; dz < SEG_LEN/2; dz += 9) {
    const d = new THREE.Mesh(gDash, matCenter); d.position.set(0, 0.01, dz); g.add(d);
  }
  g.position.set(0, 0, z); scene.add(g); return g;
}
for (let i = 0; i < SEG_COUNT; i++) segments.push(makeSeg(i * SEG_LEN));

// ── CAR ────────────────────────────────────────────────────
const car = new THREE.Group(); scene.add(car);
const mBody  = new THREE.MeshLambertMaterial({ color: 0x2277ee });
const mCabin = new THREE.MeshLambertMaterial({ color: 0x99ccff });
const mGlass = new THREE.MeshLambertMaterial({ color: 0xbbddff, transparent:true, opacity:0.65 });
const mWheel = new THREE.MeshLambertMaterial({ color: 0x111111 });
const mHub   = new THREE.MeshLambertMaterial({ color: 0xcccccc });
const mTail  = new THREE.MeshLambertMaterial({ color: 0xff2222, emissive:0xff0000, emissiveIntensity:0.5 });
const mBump  = new THREE.MeshLambertMaterial({ color: 0xdddddd });
const mUnder = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });

function addBox(parent, w,h,d, mat, px=0,py=0,pz=0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(px,py,pz); m.castShadow = true; parent.add(m); return m;
}
addBox(car, 1.8,0.55,3.8, mBody,  0, 0.55, 0);
addBox(car, 1.75,0.12,3.6, mUnder, 0, 0.22, 0);
addBox(car, 1.55,0.5,2.1,  mCabin, 0, 1.1, -0.1);
addBox(car, 1.45,0.35,0.08, mGlass, 0, 1.05, 0.97);
addBox(car, 1.45,0.35,0.08, mGlass, 0, 1.05,-1.22);
addBox(car, 1.5,0.07,0.3,  mBody,  0, 1.36,-1.1);
addBox(car, 1.82,0.25,0.12, mBump,  0, 0.38, 1.97);
addBox(car, 1.82,0.25,0.12, mBump,  0, 0.38,-1.97);
for (const sx of [-0.58, 0.58]) addBox(car, 0.45,0.16,0.07, mTail, sx, 0.55,-1.9);

const gWRim = new THREE.CylinderGeometry(0.30,0.30,0.20,14); gWRim.rotateZ(Math.PI/2);
const gWHub = new THREE.CylinderGeometry(0.12,0.12,0.22, 8); gWHub.rotateZ(Math.PI/2);
const wheels = [];
for (const [wx,wy,wz] of [[-1.07,.30,1.25],[1.07,.30,1.25],[-1.07,.30,-1.25],[1.07,.30,-1.25]]) {
  const wg = new THREE.Group();
  wg.add(new THREE.Mesh(gWRim, mWheel));
  wg.add(new THREE.Mesh(gWHub, mHub));
  wg.position.set(wx,wy,wz); wg.castShadow = true;
  car.add(wg); wheels.push(wg);
}
car.position.set(0, 0.18, 4);

// ── SKID MARKS — continuous ribbon trails ──────────────────
const SKID_WIDTH = 0.18;
const MAX_SKID_PTS = 220;

function createSkidTrail() {
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(MAX_SKID_PTS * 2 * 3);
  const indices = new Uint16Array((MAX_SKID_PTS - 1) * 6);
  for (let i = 0; i < MAX_SKID_PTS - 1; i++) {
    const b = i * 6, v = i * 2;
    indices[b]=v; indices[b+1]=v+1; indices[b+2]=v+2;
    indices[b+3]=v+1; indices[b+4]=v+3; indices[b+5]=v+2;
  }
  const posAttr = new THREE.BufferAttribute(positions, 3);
  posAttr.setUsage(THREE.DynamicDrawUsage);
  geo.setAttribute('position', posAttr);
  geo.setIndex(new THREE.BufferAttribute(indices, 1));
  geo.setDrawRange(0, 0);
  const mat = new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.50, depthWrite: false, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.frustumCulled = false;
  scene.add(mesh);
  const pts = [];
  return {
    mesh, geo, posAttr, positions, pts,
    addPoint(cx, cz, rotY) {
      pts.push({ cx, cz, rotY });
      if (pts.length > MAX_SKID_PTS) pts.shift();
      const n = pts.length;
      if (n < 2) { geo.setDrawRange(0, 0); return; }
      for (let i = 0; i < n; i++) {
        const p = pts[i];
        const hw = SKID_WIDTH / 2;
        const cosR = Math.cos(p.rotY), sinR = Math.sin(p.rotY);
        const vi = i * 6;
        positions[vi]   = p.cx - cosR * hw;  positions[vi+1] = 0.20; positions[vi+2] = p.cz + sinR * hw;
        positions[vi+3] = p.cx + cosR * hw;  positions[vi+4] = 0.20; positions[vi+5] = p.cz - sinR * hw;
      }
      posAttr.needsUpdate = true;
      geo.setDrawRange(0, (n - 1) * 6);
    },
    clear() { pts.length = 0; geo.setDrawRange(0, 0); }
  };
}

const skidL = createSkidTrail();
const skidR = createSkidTrail();

// ── OBSTACLES (Jersey barrier) ─────────────────────────────
const obstacles = [];
const mBarGray = new THREE.MeshLambertMaterial({ color: 0xdcdcdc });

function makeStripeTexture() {
  const W = 512, H = 64;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const stripes = 8, sw = W / stripes;
  for (let i = 0; i < stripes; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#111111' : '#f0f0f0';
    ctx.fillRect(i * sw, 0, sw, H);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
}
const mBarStripe = new THREE.MeshLambertMaterial({ map: makeStripeTexture() });
// BoxGeometry face order: +X, -X, +Y(top), -Y(bot), +Z, -Z
const mBarBand = [mBarStripe, mBarStripe, mBarGray, mBarGray, mBarStripe, mBarStripe];

function makeTrapezoidGeo(wBot, wTop, h, d) {
  const hb = wBot/2, ht = wTop/2, hd = d/2;
  const pos = [], nrm = [];
  function face(v0,v1,v2,v3, nx,ny,nz) {
    pos.push(...v0,...v1,...v2, ...v0,...v2,...v3);
    for(let i=0;i<6;i++) nrm.push(nx,ny,nz);
  }
  const p = [
    [-hb,0, hd],[hb,0, hd],[hb,0,-hd],[-hb,0,-hd],
    [-ht,h, hd],[ht,h, hd],[ht,h,-hd],[-ht,h,-hd],
  ];
  face(p[0],p[1],p[5],p[4],  0,0, 1);
  face(p[2],p[3],p[7],p[6],  0,0,-1);
  face(p[3],p[0],p[4],p[7], -1,0, 0);
  face(p[1],p[2],p[6],p[5],  1,0, 0);
  face(p[4],p[5],p[6],p[7],  0,1, 0);
  face(p[3],p[2],p[1],p[0],  0,-1,0);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
  geo.setAttribute('normal',   new THREE.BufferAttribute(new Float32Array(nrm), 3));
  return geo;
}

function makeBarrier() {
  const g = new THREE.Group();
  const D = 1.15, H = 1.1, wBot = 2.2, wTop = 1.05;
  const bandH = 0.22, bandW = 1.10;

  // Серое трапециевидное тело
  const body = new THREE.Mesh(makeTrapezoidGeo(wBot, wTop, H, D), mBarGray);
  body.castShadow = false;
  g.add(body);

  // Полосатая лента — Box с материалами на грань: бока=полосы, верх/низ=серый
  const band = new THREE.Mesh(new THREE.BoxGeometry(bandW, bandH, D + 0.02), mBarBand);
  band.position.y = H - bandH / 2;
  band.castShadow = false;
  g.add(band);

  return g;
}

function spawnObs() {
  const x = (Math.random()-0.5) * (ROAD_W + 3.0); // включая серую обочину
  const z = car.position.z + 65 + Math.random()*20;
  const b = makeBarrier();
  // Группа стоит так что y=0 = поверхность. Стартует высоко, падает до y=0.09 (верх дороги)
  b.position.set(x, 14 + Math.random()*4, z);
  b.userData = { vy: 0, landed: false };
  scene.add(b); obstacles.push(b);
}

// ── RESIZE ─────────────────────────────────────────────────
function resize() {
  const w = canvas.parentElement.clientWidth;
  const h = canvas.parentElement.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ── INPUT ──────────────────────────────────────────────────
function onDown(e) {
  const t = e.touches ? e.touches[0] : e;
  if (state === 'continue_offer') {
    finalizeGameOver();
    return;
    const target = e.target;
    if (target && target.closest && target.closest('#continue-buy-btn')) {
      const buyBtn = document.getElementById('continue-buy-btn');
      const activeSDK = getSDK();
      if (activeSDK && activeSDK.purchase && buyBtn) {
        buyBtn.disabled = true;
        buyBtn.textContent = 'Opening purchase...';
        activeSDK.purchase({ item: CONTINUE_ITEM_SLUG }).then(result => {
          if (result && result.success === false) {
            buyBtn.disabled = false;
            buyBtn.textContent = 'Continue Playing — 500 Bits';
          }
        }).catch(() => {
          buyBtn.disabled = false;
          buyBtn.textContent = 'Continue Playing — 500 Bits';
        });
      }
    } else {
      finalizeGameOver();
    }
    return;
  }
  touchStartX = t.clientX; touchCurX = t.clientX; touchDown = true;
  if (state === 'start' || (state === 'gameover' && Date.now() - gameOverAt > 600)) {
    if (window.RemixSDK && window.RemixSDK.hapticFeedback) {
      try { window.RemixSDK.hapticFeedback(); } catch (err) {}
    }
    startGame();
  }
}
function onMove(e) {
  if (!touchDown) return;
  touchCurX = (e.touches ? e.touches[0] : e).clientX;
}
function onUp() { touchDown = false; inputX = 0; }

// Слушаем на document — перехватит клик в любом месте
document.addEventListener('touchstart',  e => { e.preventDefault(); onDown(e); }, { passive:false });
document.addEventListener('touchmove',   e => { e.preventDefault(); onMove(e); }, { passive:false });
document.addEventListener('touchend',    e => { e.preventDefault(); onUp();    }, { passive:false });
document.addEventListener('touchcancel', e => { e.preventDefault(); onUp();    }, { passive:false });
document.addEventListener('mousedown',   onDown);
document.addEventListener('mousemove',   onMove);
document.addEventListener('mouseup',     onUp);

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code==='Space'||e.code==='Enter') && (state==='start'||(state==='gameover' && Date.now() - gameOverAt > 600))) {
    if (window.RemixSDK && window.RemixSDK.hapticFeedback) {
      try { window.RemixSDK.hapticFeedback(); } catch (err) {}
    }
    startGame();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── GAME CONTROL ───────────────────────────────────────────
const overlayEl  = document.getElementById('overlay');
const scoreEl    = document.getElementById('score');
const speedBarEl = document.getElementById('speed-bar');

function clearContinueTimers() {
  if (continueOfferTimer) {
    clearTimeout(continueOfferTimer);
    continueOfferTimer = null;
  }
  if (continueCountdownTimer) {
    clearInterval(continueCountdownTimer);
    continueCountdownTimer = null;
  }
}

function getSDK() {
  return window.FarcadeSDK || window.RemixSDK;
}

function getCurrentGameState() {
  const activeSDK = getSDK();
  return (activeSDK && activeSDK.gameState) || {};
}

function getPurchasedQuantity(itemSlug) {
  const activeSDK = getSDK();
  if (!activeSDK || !activeSDK.getItemPurchaseCount) return 0;
  try {
    return Number(activeSDK.getItemPurchaseCount(itemSlug) || 0);
  } catch (e) {
    return 0;
  }
}

function getConsumableBalance(itemSlug, spentKey) {
  const purchased = getPurchasedQuantity(itemSlug);
  const spent = Number(getCurrentGameState()[spentKey] || 0);
  return Math.max(0, purchased - spent);
}

function saveGameState(nextState) {
  const activeSDK = getSDK();
  if (!activeSDK || !activeSDK.singlePlayer || !activeSDK.singlePlayer.actions || !activeSDK.singlePlayer.actions.saveGameState) return;
  try {
    activeSDK.singlePlayer.actions.saveGameState({ gameState: nextState });
  } catch (e) {
    console.warn('saveGameState failed', e);
  }
}

function consumeContinueItem() {
  const currentState = getCurrentGameState();
  const purchased = getPurchasedQuantity(CONTINUE_ITEM_SLUG);
  const currentSpent = Number(currentState[CONTINUE_SPENT_KEY] || 0);
  const nextSpent = Math.min(purchased, Math.max(0, currentSpent + 1));
  saveGameState({ ...currentState, [CONTINUE_SPENT_KEY]: nextSpent });
}

async function syncInventory() {
  const activeSDK = getSDK();
  if (!activeSDK) return;
  getConsumableBalance(CONTINUE_ITEM_SLUG, CONTINUE_SPENT_KEY);
  if (typeof activeSDK.hasItem === 'function') {
    try {
      await activeSDK.hasItem(CONTINUE_ITEM_SLUG);
    } catch (e) {
      console.warn('hasItem check failed', e);
    }
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    syncInventory();
  }
});

function applyPurchase(itemSlug, fromCallback) {
  if (itemSlug !== CONTINUE_ITEM_SLUG) return;
  if (state !== 'continue_offer') return;
  if (!fromCallback) {
    const balance = getConsumableBalance(CONTINUE_ITEM_SLUG, CONTINUE_SPENT_KEY);
    if (balance <= 0) return;
    consumeContinueItem();
  }
  if (!hasUsedContinueThisRun) {
    hasUsedContinueThisRun = true;
    resumeFromContinue();
  }
}

function resumeFromContinue() {
  clearContinueTimers();
  hasActiveContinue = true;
  state = 'playing';
  fallTimer = 0;
  rollAngle = 0;
  carVelX = 0;
  car.rotation.set(0, 0, 0);
  car.position.y = 0.18;
  car.position.x = Math.max(-CAR_HALF_W, Math.min(CAR_HALF_W, car.position.x));
  overlayEl.classList.add('hidden');

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    if (Math.abs(car.position.z - o.position.z) < 10) {
      scene.remove(o);
      obstacles.splice(i, 1);
    }
  }

  if (audioCtx && !isMuted && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  stopMusic(true);
  if (audioCtx) {
    startMusic(masterBus, reverbBus);
  }
}

function showContinueOffer() {
  clearContinueTimers();
  stopMusic();
  continueSecondsLeft = 15;
  state = 'continue_offer';
  overlayEl.classList.remove('hidden');
  overlayEl.innerHTML = `
    <div class="continue-frame">
      <div class="continue-title">CONTINUE?</div>
      <div class="continue-sub">Keep your run going after the crash.</div>
      <button id="continue-buy-btn" class="continue-btn">Continue Playing — 500 Bits</button>
      <div id="continue-timer" class="continue-timer">15</div>
      <button id="continue-no-btn" class="continue-no">No</button>
    </div>
  `;

  const timerEl = document.getElementById('continue-timer');

  continueCountdownTimer = setInterval(() => {
    continueSecondsLeft -= 1;
    if (timerEl) timerEl.textContent = String(Math.max(0, continueSecondsLeft));
    if (continueSecondsLeft <= 0) {
      finalizeGameOver();
    }
  }, 1000);
}

function finalizeGameOver() {
  clearContinueTimers();
  stopMusic(true);
  state = 'gameover';
  gameOverAt = Date.now();
  const activeSDK = getSDK();
  if (activeSDK && activeSDK.singlePlayer && activeSDK.singlePlayer.actions) {
    try {
      activeSDK.singlePlayer.actions.gameOver({ score: Math.floor(distance) });
    } catch (e) {
      console.warn('SDK gameOver failed', e);
    }
  }
  overlayEl.innerHTML = `
    <div id="title-frame">
      <h1>DRIVER</h1>
      <p class="infinity">INFINITY</p>
    </div>
    <p class="sub">${Math.floor(distance)} m</p>
    <p class="tap">► Tap to Start ◄</p>
    <p id="status"></p>
  `;
  overlayEl.classList.remove('hidden');
}

function maybeShowContinueOffer() {
  finalizeGameOver();
  return true;
}

function stopMusic(immediate = false) {
  if (musicTimer) {
    clearTimeout(musicTimer);
    musicTimer = null;
  }
  activeMusicTimeouts.forEach(id => clearTimeout(id));
  activeMusicTimeouts.length = 0;

  if (audioCtx && musicGain) {
    const now = audioCtx.currentTime;
    try {
      musicGain.gain.cancelScheduledValues(now);
      if (immediate) {
        musicGain.gain.setValueAtTime(0, now);
      } else {
        const current = Math.max(0.0001, musicGain.gain.value || 0.0001);
        musicGain.gain.setValueAtTime(current, now);
        musicGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
      }
    } catch (e) {}
  }

  const stopAt = audioCtx ? audioCtx.currentTime + (immediate ? 0.01 : 0.25) : 0;
  activeMusicNodes.forEach(node => {
    try { node.stop(stopAt); } catch (e) {}
    try { node.disconnect(); } catch (e) {}
  });
  activeMusicNodes.length = 0;
  musicStarted = false;
}

function startGame() {
  clearContinueTimers();
  hasActiveContinue = false;
  hasUsedContinueThisRun = false;
  stopMusic(true);

  state      = 'playing';
  distance   = 0;
  carSpeed   = SPEED_BASE;
  carVelX    = 0;
  fallTimer  = 0;
  obsTimer   = 0;
  obsInterval = OBS_INTERVAL0;
  inputX     = 0;
  rollAngle  = 0;
  touchDown  = false;
  car.position.set(0, 0.18, 4);
  car.rotation.set(0, 0, 0);
  car.scale.set(1,1,1);
  obstacles.forEach(o => scene.remove(o));
  obstacles.length = 0;
  skidL.clear(); skidR.clear();
  segments.forEach((s,i) => { s.position.z = i * SEG_LEN; });

  overlayEl.innerHTML = `
    <div id="title-frame">
      <h1>DRIVER</h1>
      <p class="infinity">INFINITY</p>
    </div>
    <p class="tap">► Tap to Start ◄</p>
    <p id="status"></p>
  `;
  overlayEl.classList.add('hidden');

  initAudio();
  if (audioCtx && !isMuted && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  if (!musicStarted && audioCtx) {
    startMusic(masterBus, reverbBus);
  }
}

function triggerGameOver() {
  maybeShowContinueOffer();
}

// ── UPDATE ─────────────────────────────────────────────────
let camX = 0, camY = CAM_H, lastT = performance.now();

function update(dt) {
  if (state === 'playing') {
    carSpeed    = Math.min(SPEED_MAX, SPEED_BASE + distance * 0.018);
    obsInterval = Math.max(0.7, OBS_INTERVAL0 - distance * 0.004);

    // Input (инвертировано: камера смотрит в +Z, поэтому экранный X зеркален)
    if (touchDown) {
      inputX = Math.max(-1, Math.min(1, -(touchCurX - touchStartX) / 75));
    } else {
      inputX = keys['ArrowLeft']||keys['KeyA'] ?  1
             : keys['ArrowRight']||keys['KeyD'] ? -1 : 0;
    }

    // Steering
    carVelX += (inputX * TURN_SPEED - carVelX) * TURN_INERTIA * dt;
    car.position.z += carSpeed * dt;
    // Машина может выехать за край, но ограничена общим пространством
    car.position.x = Math.max(-ROAD_W, Math.min(ROAD_W, car.position.x + carVelX * dt));

    // Физика крена при съезде с дороги (край = внешняя граница серой обочины)
    const edgeX    = ROAD_W / 2 + 1.4; // = 6.4, внешний край обочины
    const overEdge = Math.abs(car.position.x) - edgeX;
    if (overEdge > 0) {
      const dir = car.position.x > 0 ? 1 : -1;
      rollAngle += dir * (2.0 + overEdge * 4.0) * dt;
      carSpeed  *= Math.pow(0.92, dt * 60); // замедление на обочине
    } else {
      // Восстановление крена пока на дороге
      rollAngle *= Math.pow(0.05, dt);
    }

    // Визуальный крен = крен от руля + крен от съезда
    car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, -carVelX * 0.06 - rollAngle, 10*dt);
    car.rotation.y = THREE.MathUtils.lerp(car.rotation.y,  carVelX * 0.09, 10*dt);
    wheels.forEach(w => w.rotation.x += carSpeed * dt * 0.7);

    // Следы от колёс при резком повороте — continuous ribbon
    if (Math.abs(carVelX) > 1.8) {
      const intensity = Math.min(1, Math.abs(carVelX) / TURN_SPEED);
      const rotY = car.rotation.y;
      const cosR = Math.cos(rotY), sinR = Math.sin(rotY);
      // World positions of rear wheels
      const lx = car.position.x - 1.07*cosR + 1.25*sinR;
      const lz = car.position.z - 1.07*sinR - 1.25*cosR;
      const rx = car.position.x + 1.07*cosR + 1.25*sinR;
      const rz = car.position.z + 1.07*sinR - 1.25*cosR;
      // Break ribbon if car jumped far from last recorded point
      for (const trail of [skidL, skidR]) {
        const last = trail.pts[trail.pts.length - 1];
        if (last && Math.abs(car.position.z - last.cz) > 5) trail.clear();
      }
      skidL.addPoint(lx, lz, rotY);
      skidR.addPoint(rx, rz, rotY);
      const op = 0.25 + intensity * 0.45;
      skidL.mesh.material.opacity = op;
      skidR.mesh.material.opacity = op;
    }

    distance += carSpeed * dt;
    scoreEl.textContent = Math.floor(distance) + ' m';
    speedBarEl.style.width = Math.round(((carSpeed-SPEED_BASE)/(SPEED_MAX-SPEED_BASE))*100) + '%';

    // Переворот когда крен больше ~80°
    if (Math.abs(rollAngle) > 1.35) {
      if (window.RemixSDK && window.RemixSDK.hapticFeedback) {
        try { window.RemixSDK.hapticFeedback(); } catch (err) {}
      }
      state='falling';
      fallTimer=0;
    }

    // Obstacles
    obsTimer -= dt;
    if (obsTimer <= 0) { spawnObs(); obsTimer = obsInterval; }
    for (let i = obstacles.length-1; i >= 0; i--) {
      const o = obstacles[i];
      if (!o.userData.landed) {
        o.userData.vy -= OBS_FALL_G * dt;
        o.position.y  += o.userData.vy * dt;
        if (o.position.y <= 0.09) { o.position.y = 0.09; o.userData.landed = true; }
      }
      if (o.userData.landed) {
        if (Math.abs(car.position.x-o.position.x)<1.65 && Math.abs(car.position.z-o.position.z)<2.6) {
          if (window.RemixSDK && window.RemixSDK.hapticFeedback) {
            try { window.RemixSDK.hapticFeedback(); } catch (err) {}
          }
          triggerGameOver();
        }
      }
      if (o.position.z < car.position.z-30) { scene.remove(o); obstacles.splice(i,1); }
    }

    // Road recycling
    let maxZ = -Infinity;
    segments.forEach(s => { maxZ = Math.max(maxZ, s.position.z); });
    segments.forEach(s => {
      if (s.position.z < car.position.z - SEG_LEN) { s.position.z = maxZ + SEG_LEN; maxZ += SEG_LEN; }
    });

  } else if (state === 'falling') {
    fallTimer += dt;
    const side = carVelX >= 0 ? 1 : -1;
    car.position.y -= (4 + fallTimer*14) * dt;
    car.position.z += carSpeed * 0.25 * dt;
    car.rotation.z += (1.8 + fallTimer*4) * side * dt;
    car.rotation.x += 1.2 * dt;
    carSpeed *= 0.97;
    wheels.forEach(w => w.rotation.x += carSpeed*dt*0.7);
    if (fallTimer >= 2.0) triggerGameOver();
  }

  // Camera
  camX = THREE.MathUtils.lerp(camX, car.position.x*0.45, 6*dt);
  camY = THREE.MathUtils.lerp(camY, car.position.y+CAM_H, 8*dt);
  camera.position.set(camX, camY, car.position.z-CAM_DIST);
  camera.lookAt(car.position.x*0.25, car.position.y+0.6, car.position.z+18);

  sun.position.set(car.position.x+15, 40, car.position.z+10);
  sun.target.position.set(car.position.x, 0, car.position.z+5);
  sun.target.updateMatrixWorld();
}

// ── LOOP ───────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastT)/1000, 0.05);
  lastT = ts;
  update(dt);
  renderer.render(scene, camera);
}

camera.position.set(0, CAM_H, 4-CAM_DIST);
camera.lookAt(0, 0.6, 30);
renderer.render(scene, camera);
requestAnimationFrame(loop);

// ── AUDIO ──────────────────────────────────────────────────
let audioCtx = null, musicStarted = false;
let musicTimer = null;
let activeMusicTimeouts = [];
let activeMusicNodes = [];
let masterBus = null;
let reverbBus = null;
let musicGain = null;

function initAudio() {
  if (audioCtx) {
    if (!isMuted && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (isMuted) audioCtx.suspend().catch(() => {});

  const master = audioCtx.createGain();
  master.gain.value = 0.85;
  master.connect(audioCtx.destination);
  masterBus = master;

  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.0001;
  musicGain.connect(masterBus);

  // ── Реверб ─────────────────────────────────────────────
  const revLen = audioCtx.sampleRate * 2.0;
  const revBuf = audioCtx.createBuffer(2, revLen, audioCtx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = revBuf.getChannelData(c);
    for (let i = 0; i < revLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/revLen, 2.5);
  }
  const reverb = audioCtx.createConvolver();
  reverb.buffer = revBuf;
  const revGain = audioCtx.createGain(); revGain.gain.value = 0.18;
  reverb.connect(revGain); revGain.connect(master);
  reverbBus = reverb;

  // ── МУЗЫКА (synthwave driving) ─────────────────────────
}

function startMusic(master, reverb) {
  if (!audioCtx || !musicGain) return;
  if (musicStarted) return;
  musicStarted = true;

  const now = audioCtx.currentTime;
  musicGain.gain.cancelScheduledValues(now);
  musicGain.gain.setValueAtTime(0.0001, now);
  musicGain.gain.exponentialRampToValueAtTime(0.7, now + 0.35);

  const SR  = audioCtx.sampleRate;
  const BPM = 110;
  const B   = 60 / BPM; // длина одного бита

  // Компрессор для ровного звука
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -18; comp.knee.value = 8;
  comp.ratio.value = 4; comp.attack.value = 0.003; comp.release.value = 0.15;
  comp.connect(musicGain);

  // ── Helpers ──────────────────────────────────────────────
  function registerNode(node) {
    activeMusicNodes.push(node);
    return node;
  }

  function scheduleTimeout(fn, ms) {
    const id = setTimeout(() => {
      const idx = activeMusicTimeouts.indexOf(id);
      if (idx >= 0) activeMusicTimeouts.splice(idx, 1);
      fn();
    }, ms);
    activeMusicTimeouts.push(id);
    return id;
  }

  function pad(freq, vol, dur, when) {
    [-4, 0, 4].forEach(cents => {
      const o = registerNode(audioCtx.createOscillator());
      const g = audioCtx.createGain();
      const f = audioCtx.createBiquadFilter();
      o.type = 'triangle';
      o.frequency.value = freq * Math.pow(2, cents/1200);
      f.type = 'lowpass'; f.frequency.value = freq * 3.5; f.Q.value = 0.7;
      g.gain.setValueAtTime(0, when);
      g.gain.linearRampToValueAtTime(vol, when + 0.12);
      g.gain.setValueAtTime(vol, when + dur - 0.25);
      g.gain.linearRampToValueAtTime(0, when + dur);
      o.connect(f); f.connect(g); g.connect(reverb); g.connect(comp);
      o.start(when); o.stop(when + dur + 0.05);
    });
  }

  function bass(freq, vol, dur, when) {
    const o = registerNode(audioCtx.createOscillator());
    const g = audioCtx.createGain();
    const f = audioCtx.createBiquadFilter();
    o.type = 'sine'; o.frequency.value = freq;
    f.type = 'lowpass'; f.frequency.value = 280;
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vol, when + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, when + dur);
    o.connect(f); f.connect(g); g.connect(comp);
    o.start(when); o.stop(when + dur + 0.05);
  }

  function pluck(freq, vol, dur, when) {
    // Щипковый звук лидирующей мелодии
    const o  = registerNode(audioCtx.createOscillator());
    const o2 = registerNode(audioCtx.createOscillator());
    const g  = audioCtx.createGain();
    const f  = audioCtx.createBiquadFilter();
    o.type = 'square'; o.frequency.value = freq;
    o2.type = 'sine';  o2.frequency.value = freq * 2.01;
    f.type = 'lowpass'; f.frequency.value = freq * 4; f.Q.value = 1.2;
    const g2 = audioCtx.createGain(); g2.gain.value = 0.3;
    g.gain.setValueAtTime(vol, when);
    g.gain.exponentialRampToValueAtTime(0.001, when + dur);
    o.connect(f); o2.connect(g2); g2.connect(f);
    f.connect(g); g.connect(reverb); g.connect(comp);
    o.start(when); o2.start(when);
    o.stop(when + dur + 0.05); o2.stop(when + dur + 0.05);
  }

  function kick(when) {
    const o = registerNode(audioCtx.createOscillator());
    const g = audioCtx.createGain();
    o.frequency.setValueAtTime(200, when);
    o.frequency.exponentialRampToValueAtTime(35, when + 0.10);
    g.gain.setValueAtTime(1.0, when);
    g.gain.exponentialRampToValueAtTime(0.001, when + 0.18);
    o.connect(g); g.connect(comp);
    o.start(when); o.stop(when + 0.2);
  }

  function clap(when) {
    // Хлопок: короткий шум с фильтром
    for (let i = 0; i < 3; i++) {
      const t = when + i * 0.012;
      const buf = audioCtx.createBuffer(1, SR * 0.08, SR);
      const d = buf.getChannelData(0);
      for (let j = 0; j < d.length; j++) d[j] = (Math.random()*2-1) * Math.exp(-j/(SR*0.025));
      const src = registerNode(audioCtx.createBufferSource()); src.buffer = buf;
      const flt = audioCtx.createBiquadFilter(); flt.type = 'bandpass';
      flt.frequency.value = 1200; flt.Q.value = 0.8;
      const g = audioCtx.createGain(); g.gain.value = 0.45;
      src.connect(flt); flt.connect(g); g.connect(comp);
      src.start(t); src.stop(t + 0.09);
    }
  }

  function hihat(when, open=false) {
    const buf = audioCtx.createBuffer(1, SR * (open ? 0.12 : 0.04), SR);
    const d = buf.getChannelData(0);
    for (let j = 0; j < d.length; j++) d[j] = Math.random()*2-1;
    const src = registerNode(audioCtx.createBufferSource()); src.buffer = buf;
    const flt = audioCtx.createBiquadFilter(); flt.type = 'highpass'; flt.frequency.value = 10000;
    const g = audioCtx.createGain(); g.gain.value = open ? 0.09 : 0.06;
    src.connect(flt); flt.connect(g); g.connect(comp);
    src.start(when); src.stop(when + (open ? 0.13 : 0.05));
  }

  // ── Прогрессия: C maj feel — C F Am G ───────────────────
  // Ноты: C=130.8 D=146.8 E=164.8 F=174.6 G=196 A=220 B=246.9
  const progression = [
    { pad:[130.8,164.8,196,261.6], bass:65.4  },  // C
    { pad:[174.6,220,261.6,349.2], bass:87.3  },  // F
    { pad:[220,261.6,329.6,440],   bass:110   },  // Am
    { pad:[196,246.9,293.7,392],   bass:98    },  // G
  ];

  const melody = [
    523.2, 493.9, 440,   493.9,
    523.2, 587.3, 659.3, 587.3,
    523.2, 440,   493.9, 440,
    392,   440,   493.9, 523.2,
  ];

  let bar = 0;

  function scheduleBar(when) {
    const prog = progression[bar % 4];
    const mel  = melody.slice((bar % 4) * 4, (bar % 4) * 4 + 4);

    // Пэд — весь такт
    prog.pad.forEach(f => pad(f * 0.5, 0.055, B * 4, when));
    prog.pad.forEach(f => pad(f,       0.04,  B * 4, when));

    // Бас
    bass(prog.bass, 0.55, B * 0.7, when);
    bass(prog.bass, 0.45, B * 0.5, when + B * 1.5);
    bass(prog.bass * 1.5, 0.35, B * 0.3, when + B * 2.5);
    bass(prog.bass, 0.50, B * 0.7, when + B * 3);

    // Ударные
    kick(when);          kick(when + B * 2);
    clap(when + B);      clap(when + B * 3);
    for (let i = 0; i < 8; i++) hihat(when + i * B * 0.5, i % 4 === 2);

    // Мелодия
    mel.forEach((f, i) => pluck(f, 0.12, B * 0.55, when + i * B));

    bar++;
    musicTimer = scheduleTimeout(() => scheduleBar(audioCtx.currentTime + 0.05), B * 4 * 1000 - 80);
  }

  musicTimer = scheduleTimeout(() => scheduleBar(audioCtx.currentTime + 0.1), 50);
}

function updateEngine(speed) {}

} // end initGame

try {
  initGame();
} catch(e) {
  document.getElementById('status').textContent = 'ERR: ' + e.message;
  console.error(e);
}
